services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: knovara
      POSTGRES_PASSWORD: knovara
      POSTGRES_DB: knovara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knovara -d knovara"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://knovara:knovara@db:5432/knovara}
      DOCUMENT_STORAGE_DIR: ${DOCUMENT_STORAGE_DIR:-storage/documents}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
